<!DOCTYPE html>
<html lang="portuguese">

    <head>
        <meta charset="UTF-8">
        <meta name="viewport" content="width=device-width, initial-scale=1.0">
        <title>SAIDTR - ChatBot TESTE</title>
        <link rel="stylesheet" href="style.css">
    </head>

    <body>
        <div class="app-shell">
            <aside class="side-menu">
                <div class="brand">VIVO</div>
                <nav>
                    <a href="#chat">Chat</a>
                    <a href="#problema">Relatar problema</a>
                    <a href="#perfil">Perfil</a>
                </nav>
            </aside>
            
            <main class="main-content">
                <section class="chat-panel" id="chat">
                    <div class="chat-header">
                        <div>
                            <h2>SAIDTR</h2>
                        </div>
                    </div>
                    <div class="chat-window">
                        <div class="message bot">
                            <span class="message-label">SAIDTR</span>
                            SAIDTR

                            <span class= texto_msg></span>Olá {nome}, seja bem-vinde ao SAIDTR! Fico feliz em te ver.
                            Digite o número da opção desejada:

                            <p> 1 - GBRIR DEMANDA</p>
                            <p> 2 - DEMANDAS JÁ ABERTAS</p>
                            <p> 3 - CONTINUAÇÃO DA CONVERSA</p>
                            <p>Digite a opção desejada:</p>
                        
                            </p>
                        </div>
                        <div class="message user">
                            <span class="message-label">You</span>
                            <p>1</p>
                        </div>
                        <div class="message bot">
                            <span class="message-label">SAIDTR</span>
                            <p><i>Pergunta 1</i></p>
                        </div>
                    </div>
                    <form class="chat-input-area">
                        <input type="text" placeholder="Digite sua menasagem...">
                        <button type="submit">📤</button>
                    </form>
                </section>
            </main>
        </div>
    </body>
</html>
